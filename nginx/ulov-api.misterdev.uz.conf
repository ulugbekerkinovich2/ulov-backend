server {
    listen 80;
    server_name ulov-api.misterdev.uz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    return 301 https://ulov-api.misterdev.uz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ulov-api.misterdev.uz;

    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/ulov-api.misterdev.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulov-api.misterdev.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    location = /nginx-health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Prometheus scrape endpoint — only Prometheus container + localhost may
    # reach it. Public traffic gets 403.
    location = /metrics {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://127.0.0.1:8499/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8499;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}
