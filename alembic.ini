# Alembic configuration — see ``alembic/env.py`` for the actual logic.
# URL is overridden at runtime from ``app.config.settings.DATABASE_URL``.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Use a UTC ISO prefix for migration filenames so they sort naturally.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
sqlalchemy.url = placeholder-overridden-in-env

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
